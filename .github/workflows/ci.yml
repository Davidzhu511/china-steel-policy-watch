name: 程序检查

on:
  push:
    paths-ignore:
      - "data/**"
      - "docs/data/**"
      - "docs/feed.xml"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check steelwatch tests scripts
      - run: pytest
      - run: python -m steelwatch render
